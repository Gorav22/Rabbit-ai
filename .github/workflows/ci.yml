name: CI — Lint & Build

on:
  pull_request:
    branches:
      - main

jobs:
  # ── Backend: Lint ──────────────────────────────────────────────────────────
  backend-lint:
    name: Python Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 backend/app/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --statistics

  # ── Backend: Docker Build ─────────────────────────────────────────────────
  backend-build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: rabbitai-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend: Lint ─────────────────────────────────────────────────────────
  frontend-lint:
    name: JS Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  # ── Frontend: Docker Build ─────────────────────────────────────────────────
  frontend-build:
    name: Frontend Docker Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: rabbitai-frontend:ci
          build-args: |
            VITE_API_URL=https://rabbitai-backend.onrender.com
          cache-from: type=gha
          cache-to: type=gha,mode=max
